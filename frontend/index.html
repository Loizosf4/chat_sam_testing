<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local SAM Mask Editor</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app-shell">
      <h1>Local SAM Mask Editor</h1>
      <p id="status">Checking backend...</p>

      <div class="upload-form">
        <input id="image-file" class="file-input" name="image" type="file" accept="image/*">
        <label class="button-like" for="image-file">Choose and upload image</label>
      </div>

      <dl class="image-meta">
        <div>
          <dt>Image ID</dt>
          <dd id="image-id">-</dd>
        </div>
        <div>
          <dt>Width</dt>
          <dd id="image-width">-</dd>
        </div>
        <div>
          <dt>Height</dt>
          <dd id="image-height">-</dd>
        </div>
      </dl>

      <div class="prompt-tools" role="toolbar" aria-label="Prompt tools">
        <button id="tool-box" class="tool-button is-active" type="button" data-tool="box">Box mode</button>
        <button id="tool-positive" class="tool-button" type="button" data-tool="positive">Positive point mode</button>
        <button id="tool-negative" class="tool-button" type="button" data-tool="negative">Negative point mode</button>
        <button id="clear-prompts" type="button">Clear prompts</button>
        <button id="predict-button" type="button">Predict</button>
      </div>

      <div class="workspace">
        <canvas id="image-canvas" width="960" height="540"></canvas>

        <aside class="mask-panel" aria-labelledby="mask-candidates-heading">
          <div class="mask-actions">
            <label for="object-label">Object label</label>
            <input id="object-label" type="text" placeholder="desk">
            <div class="mask-action-buttons">
              <button id="merge-selected" type="button">Merge selected</button>
              <button id="subtract-selected" type="button">Subtract selected from active mask</button>
              <button id="fill-holes" type="button">Fill holes</button>
              <button id="remove-small-parts" type="button">Remove small parts</button>
              <button id="smooth-edges" type="button">Smooth edges</button>
            </div>
            <label for="min-area">Min area</label>
            <input id="min-area" type="number" min="1" step="1" value="100">
            <label for="kernel-size">Kernel size</label>
            <input id="kernel-size" type="number" min="3" step="2" value="3">
          </div>

          <div class="mask-panel-header">
            <h2 id="mask-candidates-heading">Mask Candidates</h2>
            <label for="overlay-opacity">Opacity</label>
            <input id="overlay-opacity" type="range" min="0" max="1" step="0.05" value="0.45">
          </div>
          <div id="mask-candidates" class="mask-candidates">
              <p class="empty-state">No predictions yet.</p>
          </div>

          <section class="final-mask-section" aria-labelledby="final-masks-heading">
            <h2 id="final-masks-heading">Final Object Masks</h2>
            <div id="final-masks" class="mask-candidates">
              <p class="empty-state">No final masks yet.</p>
            </div>
          </section>
        </aside>
      </div>

      <section class="prompt-panel" aria-labelledby="prompt-json-heading">
        <h2 id="prompt-json-heading">Prompt JSON</h2>
        <pre id="prompt-json">{
  "points": [],
  "point_labels": [],
  "box": null
}</pre>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
